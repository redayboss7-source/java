    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>find-pos-neg-zero-sum</title>
    <style> 
        #box{ 
            width: 400px;
            height: 200px;
            background-color: aquamarine;
            border: 2px solid gray;
        }
    </style>
</head>
<body>
<p id="box"></p>

  <script>
    let data = [4,4,-4,-1,0,-8,0,45,9,79,0]
    let pos = 0;
    let neg = 0;
    let zero = 0;
    let sum = 0;

    for (let num of data){
        sum = sum + num;   

        if (num > 0){
            pos++;
        }
        else if (num < 0){
            neg++;
        } 
        else {
            zero++;
        }
    }
 document.getElementById("box").innerHTML = 
 "Total positive numbers:" +pos +"<br>"+
 "Total negative numbers: "+ neg +"<br>" +
 "Total zero numbers: "+ zero +"<br>" +
 "Sum of all numbers: "+ sum +"<br>" ;

    document.write(`Total positive numbers: ${pos}<br>`);
    document.write(`Total negative numbers: ${neg}<br>`);
    document.write(`Total zero numbers: ${zero}<br>`)
    document.write(`Sum of all numbers: ${sum}<br>`)
</script>
</body>
</html>
</body>
</html>
