<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let num = parseInt(prompt("Enter a number:"));

if (num <= 1) {
    document.write("Not a Prime Number");
} else {
    let isPrime = true;

    for (let i = 2; i < num; i++) {
        if (num % i === 0) {
            isPrime = false;
            break;
        }
    }

    if (isPrime) {
        document.write("Prime Number");
    } else {
        document.write("Not a Prime Number");
    }
}
</script>
    
</body>
</html>
